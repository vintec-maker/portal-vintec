<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalle – Portal de Vinculación Tecnológica UNRC</title>
  <link rel="icon" type="image/svg+xml" href="https://www.unrc.edu.ar/favicon.ico">
  <link rel="shortcut icon" href="https://www.unrc.edu.ar/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --unrc-celeste: #83d0f5;
      --unrc-rojo:    #e30613;
      --unrc-navy:    #00264d;
      --unrc-blue:    #004080;
      --unrc-sky:     #0077cc;
      --unrc-light:   #EBF3FA;
      --text-main:    #1A2A3A;
      --text-sub:     #4A5A6A;
      --border:       rgba(0,119,204,0.12);
      --radius:       14px;
      --shadow:       0 4px 24px rgba(0,64,128,0.10);
      --shadow-lg:    0 12px 48px rgba(0,64,128,0.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Myriad Pro','Source Sans 3',Arial,sans-serif; color: var(--text-main); background: #f4f8fb; }

    /* NAVBAR */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(0,38,77,0.97); backdrop-filter: blur(16px);
      border-bottom: 3px solid var(--unrc-celeste);
    }
    .nav-inner {
      max-width: 1280px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 68px;
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-logo img, .nav-logo svg { height: 40px; width: auto; }
    .nav-logo-dep { color: rgba(255,255,255,0.7); font-size: 11px; line-height: 1.3; max-width: 130px; }
    .nav-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.2); margin: 0 4px; }
    .nav-back {
      display: flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,0.8); text-decoration: none;
      font-size: 13px; font-weight: 600; padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      transition: all 0.2s; cursor: pointer;
      background: none; font-family: inherit;
    }
    .nav-back:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* HERO DETALLE */
    .detalle-hero {
      background: var(--unrc-navy); padding: 120px 32px 64px;
      position: relative; overflow: hidden;
    }
    .detalle-hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(131,208,245,0.12) 0%, transparent 60%);
    }
    .detalle-hero-inner {
      max-width: 900px; margin: 0 auto; position: relative; z-index: 1;
    }
    .detalle-tipo-badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; padding: 5px 14px; border-radius: 100px;
      margin-bottom: 20px;
    }
    .detalle-hero h1 {
      font-size: clamp(28px, 4vw, 48px); font-weight: 900;
      color: #fff; line-height: 1.15; margin-bottom: 20px;
    }
    .detalle-hero .bajada {
      font-size: 17px; color: rgba(255,255,255,0.75);
      line-height: 1.75; max-width: 700px; margin-bottom: 32px;
    }
    .detalle-meta-row {
      display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    }
    .detalle-meta-item {
      font-size: 12px; color: rgba(255,255,255,0.60);
      display: flex; align-items: center; gap: 6px;
    }
    .detalle-meta-item strong { color: rgba(255,255,255,0.90); }

    /* CUERPO */
    .detalle-body {
      max-width: 900px; margin: 0 auto;
      padding: 56px 32px 96px;
    }
    .detalle-grid {
      display: grid; grid-template-columns: 1fr 300px; gap: 48px;
      align-items: start;
    }
    .detalle-img {
      width: 100%; border-radius: var(--radius); overflow: hidden;
      margin-bottom: 32px; box-shadow: var(--shadow-lg);
    }
    .detalle-img img { width: 100%; height: auto; display: block; }
    .detalle-img-placeholder {
      width: 100%; height: 280px;
      background: linear-gradient(135deg, var(--unrc-light) 0%, #c8dff5 100%);
      display: flex; align-items: center; justify-content: center; font-size: 64px;
    }
    .detalle-contenido h2 {
      font-size: 20px; font-weight: 700; color: var(--text-main);
      margin: 32px 0 12px;
    }
    .detalle-contenido h2:first-child { margin-top: 0; }
    .detalle-contenido p {
      font-size: 15px; color: var(--text-sub); line-height: 1.8; margin-bottom: 16px;
    }
    .detalle-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .detalle-tag {
      font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 100px;
      background: var(--unrc-light); color: var(--unrc-blue); border: 1px solid var(--border);
    }

    /* Sidebar */
    .detalle-sidebar { display: flex; flex-direction: column; gap: 20px; }
    .sidebar-panel {
      background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; box-shadow: var(--shadow);
    }
    .sidebar-panel h4 {
      font-size: 13px; font-weight: 700; color: var(--text-main);
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .sidebar-row {
      display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px;
    }
    .sidebar-row:last-child { margin-bottom: 0; }
    .sidebar-row .lbl { font-size: 11px; color: var(--text-sub); text-transform: uppercase; letter-spacing: .06em; }
    .sidebar-row .val { font-size: 14px; font-weight: 600; color: var(--text-main); }
    .sidebar-cta {
      display: block; background: var(--unrc-blue); color: #fff;
      font-size: 14px; font-weight: 700; text-align: center;
      padding: 14px; border-radius: 10px; text-decoration: none;
      transition: background 0.2s; margin-top: 4px;
    }
    .sidebar-cta:hover { background: var(--unrc-sky); }
    .sidebar-cta.secondary {
      background: transparent; color: var(--unrc-blue);
      border: 1.5px solid var(--unrc-blue); margin-top: 8px;
    }
    .sidebar-cta.secondary:hover { background: var(--unrc-light); }

    /* Estado de carga / error */
    .estado-carga {
      text-align: center; padding: 120px 32px;
      font-size: 15px; color: var(--text-sub);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--unrc-light);
      border-top-color: var(--unrc-sky);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Breadcrumb */
    .breadcrumb {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 12px 32px;
    }
    .breadcrumb-inner {
      max-width: 900px; margin: 0 auto;
      font-size: 12px; color: var(--text-sub);
      display: flex; align-items: center; gap: 8px;
    }
    .breadcrumb a { color: var(--unrc-sky); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb-sep { color: var(--border); }

    @media (max-width: 768px) {
      .detalle-grid { grid-template-columns: 1fr; }
      .detalle-hero { padding: 100px 20px 48px; }
      .detalle-body { padding: 40px 20px 64px; }
      .breadcrumb { padding: 12px 20px; }
    }
  </style>
</head>

<script>
// ══════════════════════════════════════════════════════
// CONFIGURACIÓN — mismas credenciales que el portal
// ══════════════════════════════════════════════════════
const API_KEY = 'AIzaSyAYEYE_cousbwKa1hWpr4WPhfpeLa1ncVk';

const SHEET_NAMES = {
  servicio: 'Servicios',
  caso:     'Proyectos',
  noticia:  'Noticias',
  formacion:'Formacion',
  equipo:   'Equipamiento',
};

const TIPO_CONFIG = {
  servicio:  { label:'Servicio tecnológico', emoji:'🔬', bgColor:'#EBF3FA', textColor:'#004080', seccion:'Servicios' },
  caso:      { label:'Caso de éxito',         emoji:'🏆', bgColor:'#EAF5E6', textColor:'#3A7A1E', seccion:'Casos de éxito' },
  noticia:   { label:'Noticia',               emoji:'📰', bgColor:'#EEEDFE', textColor:'#534AB7', seccion:'Noticias' },
  formacion: { label:'Formación',             emoji:'📚', bgColor:'#FAEEDA', textColor:'#854F0B', seccion:'Formación' },
  equipo:    { label:'Equipamiento',           emoji:'🔬', bgColor:'#EBF3FA', textColor:'#004080', seccion:'Equipamiento' },
};

// Columnas por tipo (deben coincidir con el Sheet)
const HEADERS = {
  servicio:  ['titulo','descripcion','icono','categoria','color_hex','fondo_hex','link_texto','link_url','activo'],
  caso:      ['titulo','empresa','tipo_empresa','descripcion','resultado','resultado_icono','sector','facultad','año','activo'],
  noticia:   ['titulo','tipo','fecha','resumen','imagen_url','link','activo'],
  formacion: ['titulo','tipo','descripcion','fecha','duracion','dirigido','sector','modalidad','link','activo'],
  equipo:    ['nombre','descripcion','sectores','foto_url','especificaciones','capacidades','area','subarea','activo'],
};

// ── Parsear parámetros de la URL ──
const params = new URLSearchParams(window.location.search);
const tipo    = params.get('tipo');
const sheetId = params.get('sheet');
const row     = parseInt(params.get('row') || '2');

// ── Cargar datos ──
async function cargarDetalle() {
  if (!tipo || !sheetId || !SHEET_NAMES[tipo]) {
    mostrarError(); return;
  }
  const sheetName = SHEET_NAMES[tipo];
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(sheetName)}!A${row}:Z${row}?key=${API_KEY}`;

  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (!data.values || !data.values[0]) { mostrarError(); return; }

    const headers = HEADERS[tipo];
    const rowData = data.values[0];
    const item    = {};
    headers.forEach((h, i) => { item[h] = (rowData[i] || '').trim(); });

    renderDetalle(tipo, item);
  } catch (e) {
    console.error(e);
    mostrarError();
  }
}

function driveUrl(raw) {
  if (!raw) return '';
  const m = raw.match(/\/d\/([^\/]+)/);
  if (m) return 'https://drive.google.com/uc?export=view&id=' + m[1];
  return raw;
}

function mostrarError() {
  document.getElementById('estado-carga').style.display = 'none';
  document.getElementById('estado-error').style.display = 'block';
}

// ── Renderizado por tipo ──
function renderDetalle(tipo, d) {
  const cfg = TIPO_CONFIG[tipo];

  // Breadcrumb
  document.getElementById('breadcrumb-seccion').textContent = cfg.seccion;
  document.getElementById('breadcrumb-titulo').textContent  = d.titulo || d.nombre || '';
  document.title = (d.titulo || d.nombre || 'Detalle') + ' – Portal UNRC';

  // Badge hero
  const badge = document.getElementById('hero-badge');
  badge.textContent = cfg.emoji + ' ' + cfg.label;
  badge.style.background = cfg.bgColor;
  badge.style.color       = cfg.textColor;

  // Título y bajada
  document.getElementById('hero-titulo').textContent = d.titulo || d.nombre || '';

  // Meta + contenido + sidebar según tipo
  if (tipo === 'servicio')  renderServicio(d);
  if (tipo === 'caso')      renderCaso(d);
  if (tipo === 'noticia')   renderNoticia(d);
  if (tipo === 'formacion') renderFormacion(d);
  if (tipo === 'equipo')    renderEquipo(d);

  // Mostrar
  document.getElementById('estado-carga').style.display   = 'none';
  document.getElementById('detalle-wrapper').style.display = 'block';
}

// ── SERVICIO ──
function renderServicio(d) {
  document.getElementById('hero-bajada').textContent = d.descripcion || '';

  document.getElementById('detalle-contenido').innerHTML = `
    ${d.descripcion ? `<h2>Descripción</h2><p>${d.descripcion}</p>` : ''}
    ${d.categoria   ? `<h2>Área temática</h2><div class="detalle-tags"><span class="detalle-tag">${d.categoria}</span></div>` : ''}
  `;

  document.getElementById('detalle-sidebar').innerHTML = `
    <div class="sidebar-panel">
      <h4>Información del servicio</h4>
      ${d.categoria ? `<div class="sidebar-row"><span class="lbl">Categoría</span><span class="val">${d.categoria}</span></div>` : ''}
      <a href="index#contacto-form" class="sidebar-cta" onclick="window.close()" target="_self">Consultar este servicio →</a>
    </div>`;
}

// ── CASO DE ÉXITO ──
function renderCaso(d) {
  document.getElementById('hero-bajada').textContent = d.descripcion || '';
  document.getElementById('hero-meta').innerHTML = `
    ${d.empresa     ? `<span class="detalle-meta-item">🏭 <strong>${d.empresa}</strong></span>` : ''}
    ${d.año         ? `<span class="detalle-meta-item">📅 <strong>${d.año}</strong></span>` : ''}
    ${d.facultad    ? `<span class="detalle-meta-item">🏛️ <strong>${d.facultad}</strong></span>` : ''}
  `;

  document.getElementById('detalle-contenido').innerHTML = `
    <h2>El proyecto</h2>
    <p>${d.descripcion || ''}</p>
    ${d.resultado ? `
    <h2>Resultado principal</h2>
    <div style="background:var(--unrc-light);border-radius:12px;padding:20px 24px;display:flex;align-items:center;gap:16px;margin-bottom:16px;">
      <span style="font-size:32px;">${d.resultado_icono || '📌'}</span>
      <div><div style="font-size:11px;color:var(--text-sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Resultado</div>
      <div style="font-size:18px;font-weight:700;color:var(--text-main);">${d.resultado}</div></div>
    </div>` : ''}
    ${d.sector ? `<div class="detalle-tags"><span class="detalle-tag">🏭 ${d.sector}</span></div>` : ''}
  `;

  document.getElementById('detalle-sidebar').innerHTML = `
    <div class="sidebar-panel">
      <h4>Datos del caso</h4>
      ${d.empresa      ? `<div class="sidebar-row"><span class="lbl">Empresa / Organismo</span><span class="val">${d.empresa}</span></div>` : ''}
      ${d.tipo_empresa ? `<div class="sidebar-row"><span class="lbl">Tipo</span><span class="val">${d.tipo_empresa}</span></div>` : ''}
      ${d.facultad     ? `<div class="sidebar-row"><span class="lbl">Facultad / Instituto</span><span class="val">${d.facultad}</span></div>` : ''}
      ${d.año          ? `<div class="sidebar-row"><span class="lbl">Año</span><span class="val">${d.año}</span></div>` : ''}
      <a href="index#contacto-form" class="sidebar-cta" onclick="window.close()" target="_self">Quiero un proyecto similar →</a>
    </div>`;
}

// ── NOTICIA ──
function renderNoticia(d) {
  document.getElementById('hero-bajada').textContent = d.resumen || '';
  document.getElementById('hero-meta').innerHTML =
    d.fecha ? `<span class="detalle-meta-item">📅 <strong>${d.fecha}</strong></span>` : '';

  const imgUrl  = driveUrl(d.imagen_url);
  const imgHtml = imgUrl
    ? `<div class="detalle-img"><img src="${imgUrl}" alt="${d.titulo}" onerror="this.parentNode.style.display='none'"></div>`
    : '';

  document.getElementById('detalle-contenido').innerHTML = `
    ${imgHtml}
    <h2>Sobre esta novedad</h2>
    <p>${d.resumen || ''}</p>
    ${d.link ? `<p><a href="${d.link}" target="_blank" rel="noopener" style="color:var(--unrc-sky);font-weight:600;">Leer nota completa →</a></p>` : ''}
  `;

  document.getElementById('detalle-sidebar').innerHTML = `
    <div class="sidebar-panel">
      <h4>Información</h4>
      ${d.tipo  ? `<div class="sidebar-row"><span class="lbl">Tipo</span><span class="val">${d.tipo}</span></div>` : ''}
      ${d.fecha ? `<div class="sidebar-row"><span class="lbl">Fecha</span><span class="val">${d.fecha}</span></div>` : ''}
      ${d.link  ? `<a href="${d.link}" target="_blank" class="sidebar-cta">Ver nota completa →</a>` : ''}
      <a href="index#noticias" class="sidebar-cta secondary">← Más noticias</a>
    </div>`;
}

// ── FORMACIÓN ──
function renderFormacion(d) {
  document.getElementById('hero-bajada').textContent = d.descripcion || '';
  document.getElementById('hero-meta').innerHTML = `
    ${d.fecha     ? `<span class="detalle-meta-item">📅 <strong>${d.fecha}</strong></span>` : '<span class="detalle-meta-item">📅 <strong>Oferta permanente</strong></span>'}
    ${d.duracion  ? `<span class="detalle-meta-item">⏱ <strong>${d.duracion}</strong></span>` : ''}
    ${d.modalidad ? `<span class="detalle-meta-item">🖥️ <strong>${d.modalidad}</strong></span>` : ''}
  `;

  document.getElementById('detalle-contenido').innerHTML = `
    <h2>Descripción</h2>
    <p>${d.descripcion || ''}</p>
    ${d.dirigido ? `<h2>Dirigido a</h2><p>${d.dirigido}</p>` : ''}
    ${d.sector   ? `<div class="detalle-tags"><span class="detalle-tag">🏭 ${d.sector}</span></div>` : ''}
  `;

  document.getElementById('detalle-sidebar').innerHTML = `
    <div class="sidebar-panel">
      <h4>Datos del curso</h4>
      ${d.tipo      ? `<div class="sidebar-row"><span class="lbl">Tipo</span><span class="val">${d.tipo}</span></div>` : ''}
      ${d.duracion  ? `<div class="sidebar-row"><span class="lbl">Duración</span><span class="val">${d.duracion}</span></div>` : ''}
      ${d.modalidad ? `<div class="sidebar-row"><span class="lbl">Modalidad</span><span class="val">${d.modalidad}</span></div>` : ''}
      ${d.fecha     ? `<div class="sidebar-row"><span class="lbl">Próximo inicio</span><span class="val">${d.fecha}</span></div>` : ''}
      ${d.link      ? `<a href="${d.link}" target="_blank" class="sidebar-cta">Inscribirse →</a>` : ''}
      <a href="index#contacto-form" class="sidebar-cta ${d.link ? 'secondary' : ''}">Consultar disponibilidad →</a>
    </div>`;
}

// ── EQUIPAMIENTO ──
function renderEquipo(d) {
  document.getElementById('hero-bajada').textContent = d.descripcion || '';
  document.getElementById('hero-meta').innerHTML = `
    ${d.area    ? `<span class="detalle-meta-item">🔬 <strong>${d.area}</strong></span>` : ''}
    ${d.subarea ? `<span class="detalle-meta-item">📌 <strong>${d.subarea}</strong></span>` : ''}
  `;

  function toList(raw) {
    if (!raw) return '';
    const items = raw.split(/[;|]/).map(s => s.replace(/^[-•]\s*/,'').trim()).filter(Boolean);
    if (!items.length) return '';
    return `<ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px;">${
      items.map(i => `<li style="font-size:14px;color:var(--text-sub);padding-left:16px;position:relative;line-height:1.5;">
        <span style="position:absolute;left:0;color:var(--unrc-sky);font-weight:700;">›</span>${i}</li>`).join('')
    }</ul>`;
  }

  const imgUrl = driveUrl(d.foto_url);
  const imgHtml = imgUrl
    ? `<div class="detalle-img"><img src="${imgUrl}" alt="${d.nombre}" onerror="this.parentNode.style.display='none'"></div>`
    : '';

  const sectores = (d.sectores||'').split(/[,;]/).map(s=>s.trim()).filter(Boolean);
  const sectoresTags = sectores.map(s => `<span class="detalle-tag">${s}</span>`).join('');

  document.getElementById('detalle-contenido').innerHTML = `
    ${imgHtml}
    ${d.descripcion ? `<h2>Descripción</h2><p>${d.descripcion}</p>` : ''}
    ${d.especificaciones ? `<h2>🔧 Especificaciones técnicas</h2>${toList(d.especificaciones)}` : ''}
    ${d.capacidades      ? `<h2>✅ Capacidades clave</h2>${toList(d.capacidades)}` : ''}
    ${sectoresTags ? `<h2>Sectores destinatarios</h2><div class="detalle-tags">${sectoresTags}</div>` : ''}
  `;

  document.getElementById('detalle-sidebar').innerHTML = `
    <div class="sidebar-panel">
      <h4>Información del equipo</h4>
      ${d.area    ? `<div class="sidebar-row"><span class="lbl">Área</span><span class="val">${d.area}</span></div>` : ''}
      ${d.subarea ? `<div class="sidebar-row"><span class="lbl">Subárea</span><span class="val">${d.subarea}</span></div>` : ''}
      <a href="index#contacto-form" class="sidebar-cta" onclick="window.close()" target="_self">Consultar disponibilidad →</a>
    </div>`;
}

// Iniciar
cargarDetalle();
</script>
</body>
</html>
